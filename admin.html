<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="background: #333;">
        <h1>🛠 管理者専用ページ</h1>
        <button id="logout-btn" style="background: #ff4d4d; float: right; margin-top: -40px;">ログアウト</button>
    </header>

    <main>
        <section class="card">
            <h2>📢 お知らせの追加</h2>
            <input type="date" id="news-date">
            <textarea id="news-content" placeholder="お知らせの内容を入力"></textarea>
            <button id="add-news-btn">お知らせを投稿</button>
        </section>

        <section class="card">
            <h2>🛍 グッズの追加</h2>
            <input type="text" id="goods-name" placeholder="グッズ名">
            <input type="number" id="goods-price" placeholder="価格（円）">
            <button id="add-goods-btn">グッズを登録</button>
        </section>
        
        <p><a href="index.html">← サイトを見る画面に戻る</a></p>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ ここにもindex.htmlと同じ設定値を貼り付けます
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. ログインチェック（ログインしてない人は追い返す）
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                alert("ログインが必要です。");
                window.location.href = "index.html";
            }
        });

        // 2. お知らせの追加処理
        document.getElementById("add-news-btn").addEventListener("click", async () => {
            const date = document.getElementById("news-date").value;
            const content = document.getElementById("news-content").value;
            if(!content) return alert("内容を入力してください");

            await addDoc(collection(db, "news"), { date, content });
            alert("お知らせを追加しました！");
            document.getElementById("news-content").value = "";
        });

        // 3. グッズの追加処理
        document.getElementById("add-goods-btn").addEventListener("click", async () => {
            const name = document.getElementById("goods-name").value;
            const price = document.getElementById("goods-price").value;
            if(!name || !price) return alert("名前と価格を入力してください");

            await addDoc(collection(db, "goods"), { name, price: Number(price) });
            alert("グッズを登録しました！");
            document.getElementById("goods-name").value = "";
            document.getElementById("goods-price").value = "";
        });

        // 4. ログアウト処理
        document.getElementById("logout-btn").addEventListener("click", () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
